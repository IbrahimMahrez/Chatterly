<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chatterly Chat</title>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* container */
.chat-box {
  width: 420px;
  height: 650px;
  background: #111;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* header */
.header {
  padding: 15px;
  background: #1f1f1f;
  text-align: center;
  font-weight: bold;
  letter-spacing: 1px;
}

/* messages */
.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* message bubble */
.msg {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 15px;
  font-size: 14px;
  animation: fadeIn 0.2s ease-in;
}

.me {
  align-self: flex-end;
  background: #4f46e5;
  border-bottom-right-radius: 5px;
}

.other {
  align-self: flex-start;
  background: #2a2a2a;
  border-bottom-left-radius: 5px;
}

/* input area */
.input-area {
  display: flex;
  padding: 10px;
  background: #1f1f1f;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #2a2a2a;
  color: white;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #4f46e5;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #3730a3;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* scroll */
.messages::-webkit-scrollbar {
  width: 5px;
}
.messages::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="chat-box">

  <div class="header">🔥 Chatterly Chat</div>

  <div id="messages" class="messages"></div>

  <div class="input-area">
    <input id="msgInput" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
const socket = io("http://localhost:7000"); // ⚠️ خليها نفس بورت السيرفر عندك

const messages = document.getElementById("messages");
const input = document.getElementById("msgInput");

let roomId = "room1";
let userId = "me";

// join room
socket.emit("join_room", roomId);

// receive messages
socket.on("receive_message", (data) => {
  addMessage(data.message, "other");
});

// send message
function sendMessage() {
  const msg = input.value;
  if (!msg) return;

  socket.emit("send_message", {
    roomId,
    sender: userId,
    message: msg
  });

  addMessage(msg, "me");
  input.value = "";
}

// UI message
function addMessage(text, type) {
  const div = document.createElement("div");
  div.classList.add("msg", type);
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
